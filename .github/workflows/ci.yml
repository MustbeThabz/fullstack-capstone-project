name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - run: node -c index.js
      - run: node -c app.js
      - run: node -c db.js
      - run: node -c giftRoutes.js
      - run: node -c searchRoutes.js
      - run: node -c authRoutes.js
